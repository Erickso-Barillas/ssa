<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSA – Sistema de Selección Aleatoria</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="Icono/favicon-32x32.png">
    <link rel="apple-touch-icon" href="Icono/apple-icon-180x180.png">
    <meta name="theme-color" content="#001f3f">

    <style>
        :root {
            --primario: #001f3f; 
            --acento: #B0C4DE; 
            --fondo: #f8f7f2; 
            --blanco: #ffffff;
            --texto: #334155; 
            --gris-arena: #f2f2ed; 
            --borde-suave: #e2e8f0;
            --dorado-soft: #001f3f;

            /* Colores para las badges de la pantalla principal */
            --color-area-1: #4a77cc;
            --color-area-2: #f2ae81;
            --color-area-3: #ffeb3b;
            --color-area-4: #8bc34a;
            --color-area-5: #ff0000;
            --color-area-6: #00bcd4;
            --color-area-7: #ffb300;
        }

        html, body { height: 100%; margin: 0; padding: 0; background: var(--blanco); overflow-x: hidden; }
        body { font-family: 'Segoe UI', sans-serif; color: var(--texto); }

        .contenedor { display: flex; flex-direction: column; min-height: 100vh; max-width: 600px; margin: auto; background: var(--blanco); padding: 20px; box-sizing: border-box; }

        h1 { color: var(--primario); font-size: 16px; text-align: center; text-transform: uppercase; border-bottom: 2px solid var(--acento); padding-bottom: 15px; margin: 0 0 25px 0; letter-spacing: 1.5px; }
        
        .selector-unidades { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-tipo { padding: 15px 5px; font-weight: 700; border: 1px solid var(--borde-suave); border-radius: 12px; background: var(--gris-arena); color: var(--primario); cursor: pointer; text-transform: uppercase; font-size: 10px; transition: 0.3s; }
        .btn-tipo.activo { background: var(--primario); color: var(--acento); border-color: var(--primario); }

        .info-tarjeta { text-align: center; margin-top: 15px; font-weight: 800; color: var(--dorado-soft); text-transform: uppercase; font-size: 14px; display: none; }
        
        .resultados { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-top: 20px; flex-grow: 1; }

        .carta { background: var(--blanco); border-radius: 12px; border: 1px solid var(--borde-suave); overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); animation: appear 0.4s ease-out forwards; }
        .imagen-contenedor { width: 100%; aspect-ratio: 1/1; background: #fdfdfd; display: flex; align-items: center; justify-content: center; }
        .imagen-contenedor img { width: 90%; height: 90%; object-fit: contain; }
        
        .carta-info { padding: 10px; text-align: center; }
        .badge-numero { display: inline-block; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 900; margin-bottom: 4px; }

        .area-color-1 { background-color: var(--color-area-1); }
        .area-color-2 { background-color: var(--color-area-2); color: #000; }
        .area-color-3 { background-color: var(--color-area-3); color: #000; }
        .area-color-4 { background-color: var(--color-area-4); color: #000; }
        .area-color-5 { background-color: var(--color-area-5); }
        .area-color-6 { background-color: var(--color-area-6); }
        .area-color-7 { background-color: var(--color-area-7); color: #000; }

        .descripcion-texto { font-size: 9px; font-weight: 700; text-transform: uppercase; }

        .btn-girar { width: 100%; padding: 18px; font-size: 13px; font-weight: 800; background: var(--primario); color: var(--acento); border: none; border-radius: 14px; margin: 20px 0; cursor: pointer; display: none; text-transform: uppercase; }

        /* HISTORIAL SOBRIO */
        .control-historial { margin-top: auto; padding-top: 20px; text-align: center; }
        .btn-ver-historial { background: var(--blanco); border: 1.5px solid var(--primario); color: var(--primario); padding: 10px 28px; border-radius: 25px; font-size: 11px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        
        #moduloHistorial { display: none; margin-top: 20px; text-align: left; width: 100%; }
        
        .nivel { margin-bottom: 5px; border: 1px solid var(--borde-suave); border-radius: 8px; overflow: hidden; }
        .nivel-header { background: var(--gris-arena); padding: 12px 15px; cursor: pointer; font-size: 12px; font-weight: bold; color: var(--primario); display: flex; justify-content: space-between; align-items: center; }
        .nivel-cuerpo { display: none; padding: 10px; background: #fff; border-top: 1px solid var(--borde-suave); }

        table { width: 100%; border-collapse: collapse; font-size: 10px; }
        th { text-align: left; padding: 10px; background: var(--primario); color: var(--acento); text-transform: uppercase; font-size: 8px; letter-spacing: 0.5px; }
        td { padding: 10px 8px; border-bottom: 1px solid var(--gris-arena); color: var(--texto); vertical-align: top; }

        .unidad-negrita { font-weight: 800; color: var(--primario); display: block; }
        .tarjeta-normal { font-weight: 400; color: var(--texto); font-size: 9px; }

        footer { margin-top: 20px; text-align: center; font-size: 9px; color: #94a3b8; padding-bottom: 10px; }
        @keyframes appear { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>SSA – Sistema de Selección Aleatoria</h1>
    
    <div class="selector-unidades">
        <button class="btn-tipo" onclick="iniciarSeleccion('suministros', this)">Camión Suministros</button>
        <button class="btn-tipo" onclick="iniciarSeleccion('panel', this)">Tipo Panel</button>
        <button class="btn-tipo" onclick="iniciarSeleccion('pickup', this)">Pick-up</button>
        <button class="btn-tipo" onclick="iniciarSeleccion('tracto', this)">Tracto Remolque</button>
    </div>

    <div id="infoTarjeta" class="info-tarjeta"></div>
    <div id="resultados" class="resultados"></div>
    
    <button id="btnGirar" class="btn-girar" onclick="seleccionarTarjeta()">Selección de Tarjeta Aleatoria</button>

    <div class="control-historial">
        <button id="toggleBtn" class="btn-ver-historial" onclick="toggleModuloHistorial()">Consultar Registros</button>
        <div id="moduloHistorial"></div>
        <footer>© 2026 - SSA – Seguridad e Inspección | Autor: Erickso Barillas</footer>
    </div>
</div>

<script>
    const configVehiculos = {
        suministros: { ruta: "Fotos/Camiones de suministros", prefijo: "s" },
        panel: { ruta: "Fotos/Tipo panel", prefijo: "pa" },
        pickup: { ruta: "Fotos/Pick up", prefijo: "p" },
        tracto: { ruta: "Fotos/Tracto remolque", prefijo: "t" }
    };

    const areasMaster = {
        suministros: { 1: "Puertas, visera y guantero", 2: "Parte posterior asientos y debajo", 3: "Carter de ruedas / loderas", 4: "Combustible y escalerillas", 5: "Parte inferior y refacción", 6: "Marchamo de inspección" },
        panel: { 1: "Puertas, visera y guantero", 2: "Parte posterior asientos y debajo", 3: "Carter de ruedas / loderas", 4: "Carga / asientos pasajeros", 5: "Parte inferior" },
        pickup: { 1: "Puertas, visera y guantero", 2: "Bolsillos asientos y debajo", 3: "Maletero baúl / compartimiento", 4: "Carter de ruedas / loderas", 5: "Parte inferior", 6: "Compartimiento motor", 7: "Consola / entre asientos" },
        tracto: { 1: "Debajo de volante y guantera", 2: "Debajo de los asientos", 3: "Carter de ruedas / loderas", 4: "Parte inferior", 5: "Compartimiento motor", 6: "Contenedor remolque" }
    };

    const tarjetasMaster = {
        suministros: [ [1,3,5], [2,4,6], [1,2,6], [3,4,5], [2,3,5] ],
        panel: [ [1,3,5], [2,4,1], [2,3,4], [4,1,5], [2,3,5] ],
        pickup: [ [6,7,4], [2,6,1], [3,5,2], [5,4,7], [1,3,2] ],
        tracto: [ [1,2,3,6], [1,4,5,6], [2,3,4,6], [2,4,5,6], [1,5,3,6], [4,5,3,6] ]
    };

    let vehiculoSeleccionado = null;
    let ultimaTarjetaGenerada = null;
    const mesesNom = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

    function iniciarSeleccion(tipo, btn) {
        vehiculoSeleccionado = tipo;
        document.querySelectorAll('.btn-tipo').forEach(b => b.classList.remove('activo'));
        btn.classList.add('activo');
        document.getElementById('btnGirar').style.display = "block";
        document.getElementById('resultados').innerHTML = "";
        document.getElementById('infoTarjeta').style.display = "none";
    }

    function seleccionarTarjeta() {
        if(!vehiculoSeleccionado) return;
        const resDiv = document.getElementById('resultados');
        const infoT = document.getElementById('infoTarjeta');
        resDiv.innerHTML = "";
        const poolTarjetas = tarjetasMaster[vehiculoSeleccionado];
        let indiceAleatorio = Math.floor(Math.random() * poolTarjetas.length);
        
        while (poolTarjetas.length > 1 && indiceAleatorio === ultimaTarjetaGenerada) {
            indiceAleatorio = Math.floor(Math.random() * poolTarjetas.length);
        }

        ultimaTarjetaGenerada = indiceAleatorio;
        const numerosTarjeta = poolTarjetas[indiceAleatorio];
        infoT.innerText = `Tarjeta Seleccionada: No. ${indiceAleatorio + 1}`;
        infoT.style.display = "block";

        numerosTarjeta.forEach((num, index) => {
            setTimeout(() => {
                const nombreArea = areasMaster[vehiculoSeleccionado][num];
                const config = configVehiculos[vehiculoSeleccionado];
                const div = document.createElement('div');
                div.className = 'carta';
                div.innerHTML = `
                    <div class="imagen-contenedor">
                        <img src="${config.ruta}/${config.prefijo}${num}.png" onerror="this.src='https://via.placeholder.com/150?text=Área+${num}'">
                    </div>
                    <div class="carta-info">
                        <div class="badge-numero area-color-${num}">Zona ${num}</div>
                        <div class="descripcion-texto">${nombreArea}</div>
                    </div>
                `;
                resDiv.appendChild(div);
            }, index * 100);
        });
        guardarRegistro(vehiculoSeleccionado, indiceAleatorio + 1, numerosTarjeta);
    }

    function guardarRegistro(vehiculo, tarjetaNum, indices) {
        const d = new Date();
        const anio = d.getFullYear();
        const mes = mesesNom[d.getMonth()];
        const dia = d.getDate();
        const hora = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        const areasTexto = indices.map(n => areasMaster[vehiculo][n]).join(', ');

        let log = JSON.parse(localStorage.getItem('scsa_v4') || "{}");
        if (!log[anio]) log[anio] = {};
        if (!log[anio][mes]) log[anio][mes] = {};
        if (!log[anio][mes][dia]) log[anio][mes][dia] = [];
        
        log[anio][mes][dia].unshift({ h: hora, v: vehiculo.toUpperCase(), t: tarjetaNum, p: areasTexto });
        localStorage.setItem('scsa_v4', JSON.stringify(log));
    }

    function toggleModuloHistorial() {
        const mod = document.getElementById('moduloHistorial');
        const btn = document.getElementById('toggleBtn');
        if (mod.style.display === "block") {
            mod.style.display = "none";
            btn.innerText = "Consultar Registros";
        } else {
            mod.style.display = "block";
            btn.innerText = "Cerrar Historial";
            renderizarHistorial();
        }
    }

    function renderizarHistorial() {
        const log = JSON.parse(localStorage.getItem('scsa_v4') || "{}");
        const contenedor = document.getElementById('moduloHistorial');
        contenedor.innerHTML = "";
        
        const anios = Object.keys(log).sort((a,b) => b-a);
        if (anios.length === 0) {
            contenedor.innerHTML = "<p style='text-align:center; font-size:11px;'>No hay registros aún.</p>";
            return;
        }

        anios.forEach(anio => {
            const divAnio = crearAcordeon(`AÑO ${anio}`);
            const cuerpoAnio = divAnio.querySelector('.nivel-cuerpo');

            Object.keys(log[anio]).reverse().forEach(mes => {
                const divMes = crearAcordeon(mes.toUpperCase());
                const cuerpoMes = divMes.querySelector('.nivel-cuerpo');

                Object.keys(log[anio][mes]).sort((a,b) => b-a).forEach(dia => {
                    const divDia = crearAcordeon(`DÍA ${dia}`);
                    const cuerpoDia = divDia.querySelector('.nivel-cuerpo');

                    const tabla = `
                        <table>
                            <thead><tr><th>Hora</th><th>Unidad</th><th>Áreas Inspeccionadas</th></tr></thead>
                            <tbody>
                                ${log[anio][mes][dia].map(reg => `
                                    <tr>
                                        <td style="white-space:nowrap;">${reg.h}</td>
                                        <td>
                                            <span class="unidad-negrita">${reg.v}</span>
                                            <span class="tarjeta-normal">Tarjeta No. ${reg.t}</span>
                                        </td>
                                        <td style="color:var(--primario); font-weight:500;">${reg.p}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>`;
                    cuerpoDia.innerHTML = tabla;
                    cuerpoMes.appendChild(divDia);
                });
                cuerpoAnio.appendChild(divMes);
            });
            contenedor.appendChild(divAnio);
        });
    }

    function crearAcordeon(titulo) {
        const div = document.createElement('div');
        div.className = 'nivel';
        div.innerHTML = `
            <div class="nivel-header" onclick="toggleNivel(this)">
                ${titulo} <span>+</span>
            </div>
            <div class="nivel-cuerpo"></div>
        `;
        return div;
    }

    function toggleNivel(elemento) {
        const cuerpo = elemento.nextElementSibling;
        const icono = elemento.querySelector('span');
        const isVisible = cuerpo.style.display === 'block';
        cuerpo.style.display = isVisible ? 'none' : 'block';
        icono.innerHTML = isVisible ? '+' : '−';
        elemento.style.background = isVisible ? 'var(--gris-arena)' : 'var(--acento)';
    }
</script>
</body>
</html>
